spring.application.name=bancup

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}

# ============================================================
# Oracle Autonomous DB (Wallet)
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@atpmariano_high?TNS_ADMIN=${WALLET_PATH}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================================================
# HikariCP - Connection pool
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================
# Bancup - Configuracion de negocio
# ============================================================
bancup.auth.default-role=CLIENTE
bancup.auth.default-account-type=AHORRO

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000