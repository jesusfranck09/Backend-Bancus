spring.application.name=bancup

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}

# ============================================================
# Oracle Autonomous DB (Wallet)
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@atpmariano_high?TNS_ADMIN=${WALLET_PATH}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================================================
# HikariCP - Connection pool
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=APP_USER
spring.jpa.open-in-view=false

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================
# Bancup - Configuracion de negocio
# ============================================================
bancup.auth.default-role=CLIENTE
bancup.verification.code-expiration-minutes=10
bancup.verification.max-attempts=5
bancup.verification.max-resends=3
bancup.verification.debug-return-code=false
bancup.verification.return-code-in-response=${BANCUP_VERIFICATION_RETURN_CODE_IN_RESPONSE:${BANCUP_VERIFICATION_DEBUG_RETURN_CODE:false}}
bancup.signup.verification-token-expiration-ms=900000
bancup.mail.enabled=${BANCUP_MAIL_ENABLED:false}
bancup.mail.from=${MAIL_FROM:${spring.mail.username:}}
bancup.mail.signup.subject=${MAIL_SIGNUP_SUBJECT:Bancup - Codigo de verificacion}

# ============================================================
# Mail / SMTP
# ============================================================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
